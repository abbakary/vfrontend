<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
    <meta name="theme-color" content="#04121D" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- GLOBAL FONT STYLE -->
    <style>
      html,
      body,
      #root {
        font-family: "Poppins", sans-serif;
        margin: 0;
        padding: 0;
      }
    </style>

    <!-- TITLE -->
    <title>Dali Data Portal | Trusted Data Marketplace · Africa</title>

    <!-- DESCRIPTION -->
    <meta
      name="description"
      content="Dali Data Portal is Africa's trusted data marketplace — empowering decision-makers with precision geospatial datasets, satellite imagery, location intelligence, and analytics that drive real business outcomes. Serving Kenya, Tanzania, South Africa, Egypt, and Nigeria."
    />

    <!-- KEYWORDS -->
    <meta
      name="keywords"
      content="Dali Data Portal, data marketplace, geospatial data, satellite imagery, GIS data, spatial data platform, location intelligence, Africa data, Tanzania data portal, Kenya data, South Africa datasets, Egypt data, Nigeria data, decision intelligence Africa"
    />

    <!-- Author -->
    <meta name="author" content="Dali Data Portal" />

    <!-- Canonical -->
    <link rel="canonical" href="https://daliportal.com/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dali Data Portal" />
    <meta
      property="og:title"
      content="Dali Data Portal | Trusted Data Marketplace · Africa"
    />
    <meta
      property="og:description"
      content="Empowering Africa's decision-makers with precision data, location intelligence, and analytics that drive real business outcomes. Kenya · Tanzania · South Africa · Egypt · Nigeria."
    />
    <meta property="og:image" content="https://daliportal.com/icon.png" />
    <meta property="og:url" content="https://daliportal.com/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@DaliDataPortal" />
    <meta
      name="twitter:title"
      content="Dali Data Portal | Trusted Data Marketplace · Africa"
    />
    <meta
      name="twitter:description"
      content="Empowering Africa's decision-makers with precision data, location intelligence, and analytics that drive real business outcomes."
    />
    <meta name="twitter:image" content="https://daliportal.com/icon.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Dali Data Portal",
        "alternateName": "Dali GeoTech",
        "description": "Empowering Africa's decision-makers with precision data, location intelligence, and analytics that drive real business outcomes.",
        "url": "https://daliportal.com",
        "logo": "https://daliportal.com/icon.png",
        "slogan": "Trusted Data Marketplace · Africa",
        "email": [
          "support@daliportal.com",
          "info@daliportal.com",
          "business@daliportal.com"
        ],
        "areaServed": [
          { "@type": "Country", "name": "Kenya" },
          { "@type": "Country", "name": "Tanzania" },
          { "@type": "Country", "name": "South Africa" },
          { "@type": "Country", "name": "Egypt" },
          { "@type": "Country", "name": "Nigeria" }
        ],
        "contactPoint": [
          {
            "@type": "ContactPoint",
            "email": "support@daliportal.com",
            "contactType": "customer support",
            "availableLanguage": ["English", "Swahili"]
          },
          {
            "@type": "ContactPoint",
            "email": "business@daliportal.com",
            "contactType": "sales",
            "availableLanguage": ["English"]
          }
        ],
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Dar es Salaam",
          "addressCountry": "TZ"
        },
        "sameAs": ["https://www.daliportal.com"]
      }
    </script>

    <!-- Structured Data: WebSite (enables Google Sitelinks Search Box) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Dali Data Portal",
        "url": "https://daliportal.com",
        "description": "Africa's trusted data marketplace for geospatial datasets, satellite imagery, location intelligence, and analytics.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://daliportal.com/datasets?search={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
